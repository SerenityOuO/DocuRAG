name: docurag-agentops

services:
  backend:
    build:
      context: ../backend
    environment:
      DOCURAG_APP_NAME: DocuRAG AgentOps Backend
      DOCURAG_VERSION: 0.5.0
      DOCURAG_ENVIRONMENT: docker
      DOCURAG_DATA_DIR: /app/data
    volumes:
      - ../data:/app/data
    ports:
      - "8000:8000"
