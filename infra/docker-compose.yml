name: docurag-agentops

services:
  backend:
    build:
      context: ../backend
      args:
        DOCURAG_INSTALL_REAL_OCR: ${DOCURAG_INSTALL_REAL_OCR:-false}
    environment:
      DOCURAG_APP_NAME: DocuRAG AgentOps Backend
      DOCURAG_VERSION: 0.29.0
      DOCURAG_ENVIRONMENT: docker
      DOCURAG_DATA_DIR: /app/data
      DOCURAG_OCR_PROVIDER: ${DOCURAG_OCR_PROVIDER:-paddleocr}
      DOCURAG_LLM_PROVIDER: ${DOCURAG_LLM_PROVIDER:-ollama}
      DOCURAG_LLM_BASE_URL: ${DOCURAG_LLM_BASE_URL:-http://host.docker.internal:11434}
      DOCURAG_VLM_PROVIDER: ${DOCURAG_VLM_PROVIDER:-ollama}
      DOCURAG_VLM_BASE_URL: ${DOCURAG_VLM_BASE_URL:-http://host.docker.internal:11434}
      DOCURAG_RAG_RETRIEVAL_PROVIDER: ${DOCURAG_RAG_RETRIEVAL_PROVIDER:-hybrid_rerank}
      DOCURAG_EMBEDDING_PROVIDER: ${DOCURAG_EMBEDDING_PROVIDER:-ollama}
      DOCURAG_EMBEDDING_BASE_URL: ${DOCURAG_EMBEDDING_BASE_URL:-http://host.docker.internal:11434}
      DOCURAG_RERANK_PROVIDER: ${DOCURAG_RERANK_PROVIDER:-fastembed}
      DOCURAG_QDRANT_URL: ${DOCURAG_QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ../data:/app/data
    ports:
      - "8000:8000"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
